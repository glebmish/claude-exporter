name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Verify versions and create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches all surface versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          plugin=$(node -p "require('./obsidian-plugin/manifest.json').version")
          ext=$(node -p "require('./extension/manifest.json').version")
          fail=0
          for name in pkg plugin ext; do
            val="${!name}"
            if [ "$val" != "$tag" ]; then
              echo "::error::$name version is $val, tag is v$tag" >&2
              fail=1
            fi
          done
          [ "$fail" = "0" ]

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

  publish-cli:
    name: Publish CLI to npm
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Tests
        run: npm test

      - name: Build CLI
        run: npm run build:cli

      - name: Swap in CLI-focused README for the npm tarball
        run: cp cli/README.md README.md

      - name: Smoke test (pack + install + run in clean dir)
        run: |
          tarball=$(npm pack --silent)
          workdir=$(mktemp -d)
          (cd "$workdir" && npm init -y >/dev/null && npm install --omit=dev "$GITHUB_WORKSPACE/$tarball")
          out=$("$workdir/node_modules/.bin/claude-exporter" 2>&1 || true)
          echo "$out"
          if echo "$out" | grep -qE "ERR_MODULE_NOT_FOUND|Cannot find package|Cannot find module"; then
            echo "::error::Runtime module missing from published tarball — check dependencies vs devDependencies" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-plugin:
    name: Attach Obsidian plugin assets to release
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build plugin
        run: npm run build:plugin

      - name: Upload plugin assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            obsidian-plugin/dist/main.js \
            obsidian-plugin/dist/manifest.json \
            --clobber

  publish-extension:
    name: Attach Chrome extension bundle to release
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build extension
        run: npm run build:extension

      - name: Assemble loadable bundle
        run: |
          version="${GITHUB_REF_NAME#v}"
          bundle="claude-exporter-extension-v${version}"
          mkdir -p "$bundle/dist" "$bundle/icons"
          cp extension/manifest.json "$bundle/"
          cp extension/background.js "$bundle/"
          cp extension/popup.html extension/settings.html "$bundle/"
          cp extension/settings.css extension/styles.css "$bundle/"
          cp extension/settings.js "$bundle/"
          cp extension/jszip.min.js "$bundle/"
          cp extension/icons/icon*.png "$bundle/icons/"
          cp extension/dist/content.js extension/dist/popup.js "$bundle/dist/"
          # Reject if any sourcemaps slipped in
          if find "$bundle" -name '*.map' | grep -q .; then
            echo "::error::sourcemaps present in production bundle" >&2
            exit 1
          fi
          zip -r "${bundle}.zip" "$bundle"
          ls -la "${bundle}.zip"

      - name: Upload extension bundle to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" \
            "claude-exporter-extension-v${version}.zip" \
            --clobber
